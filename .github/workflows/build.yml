name: Build Windows Executable

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    name: Build and Test (${{ matrix.goarch }})
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint and Vet
        run: make lint

      - name: Disable Windows Password Policy (CI only)
        if: matrix.goarch == 'amd64'
        run: make disable-password-policy

      - name: Test
        # Run tests only on amd64 because windows-latest runners are x64 and cannot execute arm64 test binaries
        if: matrix.goarch == 'amd64'
        run: make test

      - name: Build Binaries
        env:
          VERSION: ${{ github.ref_name || 'dev' }}
          GOARCH: ${{ matrix.goarch }}
          OUT_DIR: .
          SUFFIX: -${{ matrix.goarch }}
        run: make build

      - name: Upload provisioner artifact
        uses: actions/upload-artifact@v7
        with:
          name: provisioner-windows-${{ matrix.goarch }}
          path: provisioner-${{ matrix.goarch }}.exe

      - name: Upload user artifact
        uses: actions/upload-artifact@v7
        with:
          name: user-windows-${{ matrix.goarch }}
          path: user-${{ matrix.goarch }}.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            provisioner-${{ matrix.goarch }}.exe
            user-${{ matrix.goarch }}.exe
