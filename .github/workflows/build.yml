name: Build Windows Executable

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    name: Build and Test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint and Vet
        run: make lint

      - name: Test
        run: make test

      - name: Build Binaries
        run: make build

      - name: Upload provisioner artifact
        uses: actions/upload-artifact@v4
        with:
          name: provisioner-windows
          path: bin/provisioner.exe

      - name: Upload user artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-windows
          path: bin/user.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            bin/provisioner.exe
            bin/user.exe
