name: Build Windows Executable

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    name: Build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build provisioner.exe
        run: |
          go build -ldflags="-s -w" -o provisioner.exe ./cmd/provisioner

      - name: Build user-setup.exe
        run: |
          go build -ldflags="-s -w" -o user-setup.exe ./cmd/user

      - name: Upload provisioner artifact
        uses: actions/upload-artifact@v4
        with:
          name: provisioner-windows
          path: provisioner.exe

      - name: Upload user-setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-setup-windows
          path: user-setup.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            provisioner.exe
            user-setup.exe
