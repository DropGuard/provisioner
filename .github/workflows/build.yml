name: Build Windows Executable

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    name: Build and Test (${{ matrix.goarch }})
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint and Vet
        run: make lint

      - name: Test
        # Run tests only on amd64 because windows-latest runners are x64 and cannot execute arm64 test binaries
        if: matrix.goarch == 'amd64'
        run: make test

      - name: Build Binaries
        env:
          GOARCH: ${{ matrix.goarch }}
        run: make build

      - name: Package Release
        shell: pwsh
        run: |
          Compress-Archive -Path bin/* -DestinationPath "provisioner-${{ github.ref_name }}-windows-${{ matrix.goarch }}.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: provisioner-windows-${{ matrix.goarch }}
          path: provisioner-*.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: provisioner-*.zip
